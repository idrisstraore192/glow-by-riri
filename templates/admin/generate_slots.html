{% extends "admin/base_site.html" %}
{% block content %}
<h1 style="margin-bottom:1.5rem;">Générer des créneaux en lot</h1>

{% if success_msg %}
<div style="background:#d4edda;border:1px solid #c3e6cb;color:#155724;padding:12px 16px;border-radius:4px;margin-bottom:1.5rem;">
  {{ success_msg }}
</div>
{% endif %}

{% if errors %}
<div style="background:#f8d7da;border:1px solid #f5c6cb;color:#721c24;padding:12px 16px;border-radius:4px;margin-bottom:1.5rem;">
  {% for e in errors %}<p style="margin:0;">{{ e }}</p>{% endfor %}
</div>
{% endif %}

<form method="post" style="max-width:500px;">
  {% csrf_token %}

  <div style="margin-bottom:1.2rem;">
    <label style="display:block;font-weight:bold;margin-bottom:4px;">Date de début</label>
    <input type="date" name="date_start" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;">
  </div>

  <div style="margin-bottom:1.2rem;">
    <label style="display:block;font-weight:bold;margin-bottom:4px;">Date de fin</label>
    <input type="date" name="date_end" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;">
  </div>

  <div style="display:flex;gap:1rem;margin-bottom:1.2rem;">
    <div style="flex:1;">
      <label style="display:block;font-weight:bold;margin-bottom:4px;">Heure de début</label>
      <input type="time" name="time_start" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;">
    </div>
    <div style="flex:1;">
      <label style="display:block;font-weight:bold;margin-bottom:4px;">Heure de fin</label>
      <input type="time" name="time_end" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;">
    </div>
  </div>

  <div style="margin-bottom:1.2rem;">
    <label style="display:block;font-weight:bold;margin-bottom:4px;">Durée des créneaux (minutes)</label>
    <input type="number" name="duration" value="60" min="15" max="480" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;">
  </div>

  <div style="margin-bottom:1.5rem;">
    <label style="display:block;font-weight:bold;margin-bottom:8px;">Jours à inclure</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
      {% for val, label in days %}
      <label style="display:flex;align-items:center;gap:4px;background:#fdf6fb;padding:6px 12px;border-radius:4px;border:1px solid #f8d0e8;cursor:pointer;">
        <input type="checkbox" name="days" value="{{ val }}" checked> {{ label }}
      </label>
      {% endfor %}
    </div>
  </div>

  <button type="submit"
          style="background:#f8d0e8;color:#1a1a1a;border:none;padding:10px 24px;border-radius:4px;font-size:15px;cursor:pointer;font-weight:bold;">
    Générer les créneaux
  </button>

  <a href="/admin/booking/availabilityslot/"
     style="margin-left:12px;color:#666;font-size:14px;text-decoration:none;">Annuler</a>
</form>
{% endblock %}
